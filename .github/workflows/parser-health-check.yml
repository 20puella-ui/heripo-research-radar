name: Parser Health-Check

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 15:00 KST (= 06:00 UTC)
  workflow_dispatch:

concurrency:
  group: parser-health-check
  cancel-in-progress: false # Health-check must run to completion

jobs:
  health-check:
    name: Run Parser Health-Check
    runs-on: org-linux
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run health-check
        id: health_check
        continue-on-error: true
        run: npm run health-check

      - name: Build Slack payload
        if: always()
        env:
          OUTCOME: ${{ steps.health_check.outcome }}
          SUMMARY: ${{ steps.health_check.outputs.summary }}
          CHANNEL: ${{ vars.SLACK_ALERT_DEV_CHANNEL }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -c '
          import json, os

          outcome = os.environ["OUTCOME"]
          summary = os.environ.get("SUMMARY", "")
          channel = os.environ["CHANNEL"]
          repo = os.environ["REPO"]
          actor = os.environ["ACTOR"]
          run_url = os.environ["RUN_URL"]

          title = "✅ 뉴스레터 파서 헬스체크 통과" if outcome == "success" else "🚨 뉴스레터 파서 헬스체크 실패"

          header = f"*{title}*\n\n*프로젝트:* {repo}\n*실행자:* {actor}\n\n<{run_url}|🔗 워크플로우 로그 보기>"

          payload = {
              "channel": channel,
              "text": f"{title}: {repo}",
              "blocks": [
                  {"type": "section", "text": {"type": "mrkdwn", "text": header}},
                  {"type": "section", "text": {"type": "mrkdwn", "text": summary or "_(no summary)_"}},
              ],
          }

          with open("slack-payload.json", "w") as f:
              json.dump(payload, f, ensure_ascii=False)
          '

      - name: Slack notification
        uses: slackapi/slack-github-action@v3
        if: always()
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-file-path: slack-payload.json

      - name: Fail workflow if health-check failed
        if: steps.health_check.outcome == 'failure'
        run: exit 1
